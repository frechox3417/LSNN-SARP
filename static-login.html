<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login LSNN - Los Santos News Network</title>
    <link rel="stylesheet" href="static-homepage.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js"></script>
  </head>
  <body>
    <div class="page-shell login-shell">
      <div class="login-card">
        <div class="login-heading">
          <div>
            <p class="eyebrow">Portal de acceso</p>
            <h1>LSNN <span>Portal</span></h1>
            <p class="login-subtitle">Ingresa como staff o ciudadano autorizado para acceder a servicios internos.</p>
          </div>
        </div>

        <form id="authForm" class="login-form">
          <div class="form-row hidden" id="usernameRow">
            <label class="field-label" for="username">Nombre de Usuario</label>
            <input id="username" name="username" type="text" placeholder="Dimitri_Romanov" />
          </div>

          <div class="form-row">
            <label class="field-label" for="email">Correo Electrónico</label>
            <input id="email" name="email" type="email" placeholder="prensa@lsnn.com" required />
          </div>

          <div class="form-row">
            <label class="field-label" for="password">Contraseña</label>
            <input id="password" name="password" type="password" placeholder="********" required />
          </div>

          <button type="submit" class="cta-button login-submit">Iniciar Sesión</button>
        </form>

        <p id="message" class="login-message"></p>

        <div class="login-footer">
          <button id="toggleMode" class="footer-action">¿No tienes cuenta? Regístrate</button>
          <a href="./index.html" class="footer-link">Volver al inicio</a>
        </div>
      </div>
    </div>

    <script src="static-login.js?v=5"></script>
  </body>
</html>
